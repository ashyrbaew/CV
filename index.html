<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My CV</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 0;
            text-align: center;
        }
        section {
            margin: 20px 0;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1, h2, h3 {
            color: #333;
        }
    </style>
</head>
<body>
    <header>
        <h1>My CV</h1>
    </header>
    <section>
        <h2>Education</h2>
        <p>[Your Education Information]</p>
    </section>
    <section>
        <h2>Experience</h2>
        <p>[Your Work Experience]</p>
    </section>
    <section>
        <h2>Skills</h2>
        <p>[Your Skills]</p>
    </section>
</body>
</html>
